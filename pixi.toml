[workspace]
name = "neotest-bokehjs"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[tasks]
install = 'nvim -l tests/init.lua --install'
update = 'nvim -l tests/init.lua --update'
test = 'nvim -l tests/init.lua tests/'
update-all = { depends-on = [
    { task = "update", environment = "nvim-010" },
    { task = "update", environment = "nvim-011" },
    { task = "update", environment = "nvim-012" },
] }

[dependencies]
nodejs = "*"
nvim = "*"
tree-sitter-cli = "*"

[environments]
nvim-010 = ["nvim-010"]
nvim-011 = ["nvim-011"]
nvim-012 = ["nvim-012"]

[feature.nvim-010]
platforms = ["linux-64", "osx-arm64"]

[feature.nvim-010.dependencies]
nvim = "0.10.*"

[feature.nvim-011.dependencies]
nvim = "0.11.*"

[feature.nvim-012.dependencies]
nvim = "0.12.*"
